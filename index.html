  <body>
    <header>
      <h1>Akan Name Generator</h1>
      <p>
        Akan names come from Ghanaian culture, where children are named based on
        the day they were born. This is a simple web application that calculates
        the day of the week a user was born and assigns them an Akan name based
        on their gender.
      </p>
